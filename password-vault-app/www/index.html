<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="密码本">
  <title>密码本 - 个人账号记事</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #252542;
      --border: rgba(255,255,255,0.08);
      --text: #eaeaf0;
      --muted: #8888a0;
      --accent: #6c63ff;
      --accent2: #8b83ff;
      --danger: #ff4757;
      --success: #2ed573;
      --radius: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .screen { display: none; min-height: 100dvh; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── Lock Screen ── */
    #lock-screen {
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, #252542 0%, var(--bg) 60%);
    }

    .lock-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(108,99,255,0.35);
    }

    #lock-screen h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    #lock-screen p { color: var(--muted); font-size: 14px; margin-bottom: 32px; text-align: center; }

    .pin-dots {
      display: flex; gap: 14px; margin-bottom: 28px;
    }
    .pin-dots span {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--muted);
      transition: all 0.15s;
    }
    .pin-dots span.filled { background: var(--accent); border-color: var(--accent); }

    .pin-pad {
      display: grid; grid-template-columns: repeat(3, 72px);
      gap: 12px;
    }
    .pin-pad button {
      width: 72px; height: 72px;
      border: none; border-radius: 50%;
      background: var(--surface2);
      color: var(--text);
      font-size: 24px; font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .pin-pad button:active { transform: scale(0.92); background: var(--accent); }
    .pin-pad .pin-action { font-size: 14px; color: var(--muted); }

    .lock-error { color: var(--danger); font-size: 13px; height: 20px; margin-top: 12px; }

    /* ── Setup Screen ── */
    #setup-screen { padding: calc(var(--safe-top) + 40px) 24px 24px; }
    #setup-screen h1 { font-size: 24px; margin-bottom: 8px; }
    #setup-screen .desc { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 13px; color: var(--muted);
      margin-bottom: 8px; font-weight: 500;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 14px 16px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 16px; outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: var(--accent);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .input-row { position: relative; }
    .input-row input { padding-right: 48px; }
    .input-row .toggle-vis {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px;
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 24px; border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--muted); font-size: 14px; padding: 10px; }

    .warn-box {
      background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.25);
      border-radius: var(--radius); padding: 14px; font-size: 13px;
      color: #ff8a94; line-height: 1.5; margin-bottom: 20px;
    }

    /* ── Main App ── */
    #app-screen { padding-bottom: calc(70px + var(--safe-bottom)); }

    .app-header {
      position: sticky; top: 0; z-index: 20;
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      background: rgba(15,15,26,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .app-header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .app-header h1 { font-size: 22px; font-weight: 700; }
    .header-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 40px; height: 40px; border: none; border-radius: 12px;
      background: var(--surface2); color: var(--text);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:active { background: var(--accent); }

    .search-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2); border-radius: var(--radius);
      padding: 0 14px; border: 1px solid var(--border);
    }
    .search-bar input {
      flex: 1; border: none; background: none; color: var(--text);
      font-size: 15px; padding: 12px 0; outline: none;
    }
    .search-bar span { color: var(--muted); font-size: 16px; }

    .category-tabs {
      display: flex; gap: 8px; padding: 12px 16px;
      overflow-x: auto; scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }
    .cat-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .entry-list { padding: 0 16px 16px; flex: 1; }
    .entry-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .entry-card:active { border-color: var(--accent); }
    .entry-card-top {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .entry-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--surface2); display: flex;
      align-items: center; justify-content: center; font-size: 22px;
      flex-shrink: 0;
    }
    .entry-info { flex: 1; min-width: 0; }
    .entry-info h3 {
      font-size: 16px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .entry-info .account {
      font-size: 13px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .entry-tag {
      font-size: 11px; padding: 3px 8px; border-radius: 6px;
      background: rgba(108,99,255,0.15); color: var(--accent2);
    }
    .entry-actions {
      display: flex; gap: 8px; margin-top: 4px;
    }
    .entry-actions button {
      flex: 1; padding: 8px; border: 1px solid var(--border);
      border-radius: 10px; background: var(--surface2);
      color: var(--text); font-size: 12px; cursor: pointer;
    }
    .entry-actions button:active { background: var(--accent); border-color: var(--accent); }

    .empty-state {
      text-align: center; padding: 60px 24px; color: var(--muted);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    .fab {
      position: fixed; bottom: calc(80px + var(--safe-bottom)); right: 20px;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      border: none; color: #fff; font-size: 28px;
      box-shadow: 0 4px 20px rgba(108,99,255,0.45);
      cursor: pointer; z-index: 15;
      display: flex; align-items: center; justify-content: center;
    }
    .fab:active { transform: scale(0.92); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: var(--safe-bottom); z-index: 20;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; padding: 10px 0; border: none; background: none;
      color: var(--muted); font-size: 11px; cursor: pointer;
    }
    .nav-item .nav-icon { font-size: 22px; }
    .nav-item.active { color: var(--accent); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 50; display: none; align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: 100%; max-height: 92dvh;
      background: var(--surface); border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(20px + var(--safe-bottom));
      overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-header h2 { font-size: 18px; }
    .modal-close {
      width: 32px; height: 32px; border: none; border-radius: 8px;
      background: var(--surface2); color: var(--muted); font-size: 18px; cursor: pointer;
    }

    .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
    .modal-footer .btn { flex: 1; }
    .btn-danger { background: rgba(255,71,87,0.15); color: var(--danger); }

    .gen-row {
      display: flex; gap: 8px; align-items: center;
    }
    .gen-row input { flex: 1; }
    .gen-btn {
      padding: 14px 16px; border: 1px solid var(--accent);
      border-radius: var(--radius); background: rgba(108,99,255,0.1);
      color: var(--accent2); font-size: 13px; white-space: nowrap; cursor: pointer;
    }

    /* ── Settings Panel ── */
    .settings-panel { padding: 16px; display: none; }
    .settings-panel.active { display: block; }
    .settings-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
    }
    .settings-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; font-size: 15px;
    }
    .settings-item:last-child { border-bottom: none; }
    .settings-item .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .settings-item:active { background: var(--surface2); }

    .toggle-switch {
      width: 48px; height: 28px; border-radius: 14px;
      background: var(--surface2); border: 1px solid var(--border);
      position: relative; flex-shrink: 0;
    }
    .toggle-switch.on { background: var(--accent); border-color: var(--accent); }
    .toggle-switch::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 20px; height: 20px; border-radius: 50%; background: #fff;
      transition: transform 0.2s;
    }
    .toggle-switch.on::after { transform: translateX(20px); }

    .shot-grid { padding: 0 16px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .shot-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .shot-card img { width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block; background: #000; }
    .shot-card .shot-meta { padding: 10px; font-size: 12px; color: var(--muted); }

    .toast {
      position: fixed; bottom: calc(90px + var(--safe-bottom)); left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2); color: var(--text);
      padding: 12px 24px; border-radius: 24px;
      font-size: 14px; z-index: 100; opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap;
      border: 1px solid var(--border);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .detail-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .detail-value { font-size: 15px; word-break: break-all; }
    .detail-copy {
      padding: 6px 12px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--surface2);
      color: var(--accent2); font-size: 12px; cursor: pointer; flex-shrink: 0; margin-left: 12px;
    }

    #file-input { display: none; }
  </style>
</head>
<body>

<!-- 首次设置 -->
<div id="setup-screen" class="screen">
  <div class="lock-logo">🔐</div>
  <h1>欢迎使用密码本</h1>
  <p class="desc">设置一个 4～6 位数字 PIN 码，用于解锁应用。你的账号密码将加密保存在本机，不会上传到任何服务器。</p>
  <div class="warn-box">⚠️ 请务必记住 PIN 码！忘记 PIN 将无法恢复已保存的数据。</div>
  <div class="form-group">
    <label>设置 PIN 码（4～6 位数字）</label>
    <input type="password" id="setup-pin" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="请输入 PIN 码">
  </div>
  <div class="form-group">
    <label>确认 PIN 码</label>
    <input type="password" id="setup-pin-confirm" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="再次输入 PIN 码">
  </div>
  <button class="btn btn-primary" id="setup-btn">开始使用</button>
</div>

<!-- 解锁 -->
<div id="lock-screen" class="screen">
  <div class="lock-logo">🔐</div>
  <h1>密码本</h1>
  <p>输入 PIN 码解锁</p>
  <div class="pin-dots" id="pin-dots">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="pin-pad" id="pin-pad">
    <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
    <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
    <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
    <button class="pin-action" data-key="clear">清除</button>
    <button data-key="0">0</button>
    <button class="pin-action" data-key="back">⌫</button>
  </div>
  <div class="lock-error" id="lock-error"></div>
</div>

<!-- 主界面 -->
<div id="app-screen" class="screen">
  <div class="app-header">
    <div class="app-header-top">
      <h1 id="page-title">我的账号</h1>
      <div class="header-actions">
        <button class="icon-btn" id="lock-btn" title="锁定">🔒</button>
      </div>
    </div>
    <div class="search-bar" id="search-wrap">
      <span>🔍</span>
      <input type="search" id="search-input" placeholder="搜索程序名、账号…">
    </div>
  </div>

  <div id="home-view">
    <div class="category-tabs" id="category-tabs"></div>
    <div class="entry-list" id="entry-list"></div>
    <button class="fab" id="add-btn" title="添加">+</button>
  </div>

  <div id="shots-view" style="display:none">
    <div class="entry-list" id="shots-list"></div>
  </div>

  <div id="settings-view" class="settings-panel">
    <div class="settings-section" id="native-settings" style="display:none">
      <div class="settings-item" id="overlay-toggle-item">
        <div><div>后台悬浮球</div><div class="sub">切到后台显示圆标；截屏后点确定保存（需相册权限）</div></div>
        <div class="toggle-switch" id="overlay-toggle"></div>
      </div>
      <div class="settings-item" id="overlay-perm-btn">
        <div><div>悬浮窗权限</div><div class="sub">点击前往系统设置开启</div></div>
        <span>🔵</span>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-item" id="export-btn">
        <div><div>导出备份</div><div class="sub">将数据导出为 JSON 文件</div></div>
        <span>📤</span>
      </div>
      <div class="settings-item" id="import-btn">
        <div><div>导入备份</div><div class="sub">从 JSON 文件恢复数据</div></div>
        <span>📥</span>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-item" id="change-pin-btn">
        <div><div>修改 PIN 码</div><div class="sub">更改解锁密码</div></div>
        <span>🔑</span>
      </div>
      <div class="settings-item" id="about-btn">
        <div><div>关于</div><div class="sub">密码本 v1.0 · 数据仅存本机</div></div>
        <span>ℹ️</span>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-item" id="clear-data-btn" style="color: var(--danger);">
        <div><div>清除所有数据</div><div class="sub">删除全部账号并重置应用</div></div>
        <span>🗑️</span>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="home"><span class="nav-icon">📋</span>账号</button>
    <button class="nav-item" data-tab="shots"><span class="nav-icon">📸</span>截图</button>
    <button class="nav-item" data-tab="settings"><span class="nav-icon">⚙️</span>设置</button>
  </nav>
</div>

<!-- 添加/编辑弹窗 -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">添加账号</h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="form-group">
      <label>程序 / 网站名称 *</label>
      <input type="text" id="f-name" placeholder="例如：微信、Steam、公司邮箱">
    </div>
    <div class="form-group">
      <label>分类</label>
      <select id="f-category">
        <option value="社交">社交</option>
        <option value="工作">工作</option>
        <option value="游戏">游戏</option>
        <option value="金融">金融</option>
        <option value="购物">购物</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>账号 / 用户名</label>
      <input type="text" id="f-account" placeholder="手机号、邮箱或用户名" autocomplete="off">
    </div>
    <div class="form-group">
      <label>密码</label>
      <div class="gen-row">
        <div class="input-row" style="flex:1">
          <input type="password" id="f-password" placeholder="输入密码" autocomplete="new-password">
          <button type="button" class="toggle-vis" data-target="f-password">👁</button>
        </div>
        <button type="button" class="gen-btn" id="gen-password">随机生成</button>
      </div>
    </div>
    <div class="form-group">
      <label>备注</label>
      <textarea id="f-notes" placeholder="安全问题、绑定邮箱、其他说明…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="delete-btn" style="display:none">删除</button>
      <button class="btn btn-primary" id="save-btn">保存</button>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="detail-name">详情</h2>
      <button class="modal-close" id="detail-close">✕</button>
    </div>
    <div id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="detail-edit-btn">编辑</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".json,application/json">

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'vault_v1';
const CATEGORIES = ['全部', '社交', '工作', '游戏', '金融', '购物', '其他'];
const CATEGORY_ICONS = { '社交': '💬', '工作': '💼', '游戏': '🎮', '金融': '💰', '购物': '🛒', '其他': '📌' };

let cryptoKey = null;
let entries = [];
let currentPin = '';
let pinLength = 4;
let activeCategory = '全部';
let editingId = null;
let detailEntryId = null;
let nativePlugin = null;
let overlayEnabled = false;

function initNative() {
  const cap = window.Capacitor;
  if (cap && cap.isNativePlatform && cap.isNativePlatform() && cap.Plugins?.VaultNative) {
    nativePlugin = cap.Plugins.VaultNative;
    document.getElementById('native-settings').style.display = 'block';
    nativePlugin.getOverlayEnabled().then(res => {
      overlayEnabled = !!res.enabled;
      document.getElementById('overlay-toggle').classList.toggle('on', overlayEnabled);
    }).catch(() => {});
    window.addEventListener('vault-screenshot-saved', () => {
      if (cryptoKey) syncPendingScreenshots();
    });
    window.addEventListener('vault-overlay-changed', (e) => {
      overlayEnabled = !!e.detail?.enabled;
      document.getElementById('overlay-toggle').classList.toggle('on', overlayEnabled);
    });
  }
}

async function refreshNativeState() {
  if (!nativePlugin) return;
  try {
    const res = await nativePlugin.getOverlayEnabled();
    overlayEnabled = !!res.enabled;
    document.getElementById('overlay-toggle').classList.toggle('on', overlayEnabled);
  } catch (_) {}
}

async function syncPendingScreenshots() {
  if (!nativePlugin || !cryptoKey) return;
  try {
    const res = await nativePlugin.getPendingScreenshots();
    const items = JSON.parse(res.items || '[]');
    if (!items.length) return;
    for (const item of items) {
      const data = await nativePlugin.consumeScreenshot({ id: item.id });
      const d = new Date(data.time || Date.now());
      const label = `截图 ${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      entries.unshift({
        id: uid(),
        type: 'screenshot',
        name: label,
        category: '截图',
        imageData: data.base64,
        notes: '',
        updatedAt: Date.now()
      });
    }
    await saveVault();
    renderShots();
    renderEntries();
    toast(`已保存 ${items.length} 张截图到记事本`);
  } catch (e) {
    console.error('sync screenshots', e);
    toast('截图同步失败，请稍后在「截图」页重试');
  }
}

function getShots() {
  return entries.filter(e => e.type === 'screenshot' || e.imageData);
}

function renderShots() {
  const list = getShots().sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  const container = document.getElementById('shots-list');
  if (!list.length) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">📸</div><p>暂无截图<br>开启悬浮球后截屏并点「确定」保存<br>保存后需打开密码本解锁，在「截图」页查看</p></div>`;
    return;
  }
  container.innerHTML = `<div class="shot-grid">${list.map(e => `
    <div class="shot-card" data-id="${e.id}">
      <img src="data:image/jpeg;base64,${e.imageData}" alt="">
      <div class="shot-meta">${esc(e.name)}</div>
    </div>`).join('')}</div>`;
  container.querySelectorAll('.shot-card').forEach(card => {
    card.addEventListener('click', () => openShotDetail(card.dataset.id));
  });
}

function openShotDetail(id) {
  const e = entries.find(x => x.id === id);
  if (!e?.imageData) return;
  detailEntryId = id;
  document.getElementById('detail-name').textContent = e.name;
  document.getElementById('detail-body').innerHTML = `
    <img src="data:image/jpeg;base64,${e.imageData}" style="width:100%;border-radius:12px;margin-bottom:12px" alt="">
    ${e.notes ? `<div class="detail-row"><div><div class="detail-label">备注</div><div class="detail-value">${esc(e.notes)}</div></div></div>` : ''}
  `;
  document.getElementById('detail-edit-btn').style.display = 'none';
  document.getElementById('detail-modal').classList.add('open');
}

async function setOverlayEnabledUI(enabled) {
  overlayEnabled = enabled;
  const toggle = document.getElementById('overlay-toggle');
  toggle.classList.toggle('on', enabled);
  if (!nativePlugin) return;
  if (enabled) {
    const perm = await nativePlugin.hasOverlayPermission();
    if (!perm.granted) {
      toast('请先开启悬浮窗权限');
      nativePlugin.openOverlaySettings();
      overlayEnabled = false;
      toggle.classList.remove('on');
      return;
    }
    await nativePlugin.requestMediaPermission();
    await nativePlugin.setOverlayEnabled({ enabled: true });
    toast('后台悬浮球已开启');
  } else {
    await nativePlugin.setOverlayEnabled({ enabled: false });
    toast('已关闭后台悬浮球');
  }
}

// ── Crypto ──
async function deriveKey(pin, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encrypt(data, key) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  return {
    iv: Array.from(iv),
    data: Array.from(new Uint8Array(cipher))
  };
}

async function decrypt(payload, key) {
  const dec = new TextDecoder();
  const plain = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: new Uint8Array(payload.iv) },
    key,
    new Uint8Array(payload.data)
  );
  return JSON.parse(dec.decode(plain));
}

async function hashPin(pin) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest('SHA-256', enc.encode(pin + '_vault_salt'));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── Storage ──
function getMeta() {
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : null;
}

async function saveVault() {
  const meta = getMeta();
  const encrypted = await encrypt(entries, cryptoKey);
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...meta, vault: encrypted }));
}

async function loadVault(pin) {
  const meta = getMeta();
  if (!meta?.vault) { entries = []; return true; }
  try {
    cryptoKey = await deriveKey(pin, new Uint8Array(meta.salt));
    entries = await decrypt(meta.vault, cryptoKey);
    pinLength = meta.pinLength || 4;
    return true;
  } catch {
    return false;
  }
}

async function setupVault(pin) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  cryptoKey = await deriveKey(pin, salt);
  entries = [];
  pinLength = pin.length;
  const pinHash = await hashPin(pin);
  const encrypted = await encrypt(entries, cryptoKey);
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    pinHash, salt: Array.from(salt), pinLength, vault: encrypted
  }));
}

// ── UI Helpers ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    toast('已复制到剪贴板');
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('已复制到剪贴板');
  }
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function generatePassword(len = 16) {
  const chars = 'abcdefghijkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789!@#$%&*';
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, b => chars[b % chars.length]).join('');
}

function lockApp() {
  if (nativePlugin) nativePlugin.stopOverlay().catch(() => {});
  cryptoKey = null;
  entries = [];
  currentPin = '';
  updatePinDots();
  document.getElementById('lock-error').textContent = '';
  showScreen('lock-screen');
}

// ── Render ──
function renderCategories() {
  const tabs = document.getElementById('category-tabs');
  tabs.innerHTML = CATEGORIES.map(cat =>
    `<button class="cat-tab${cat === activeCategory ? ' active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');
  tabs.querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      renderCategories();
      renderEntries();
    });
  });
}

function renderEntries() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  let list = entries.filter(e => e.type !== 'screenshot' && !e.imageData);
  if (activeCategory !== '全部') list = list.filter(e => e.category === activeCategory);
  if (query) {
    list = list.filter(e =>
      e.name.toLowerCase().includes(query) ||
      (e.account || '').toLowerCase().includes(query) ||
      (e.notes || '').toLowerCase().includes(query)
    );
  }
  list.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

  const container = document.getElementById('entry-list');
  if (!list.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="emoji">${query || activeCategory !== '全部' ? '🔍' : '📝'}</div>
      <p>${query ? '没有找到匹配的账号' : activeCategory !== '全部' ? '该分类下暂无账号' : '还没有保存任何账号<br>点击右下角 + 添加第一条'}</p>
    </div>`;
    return;
  }

  container.innerHTML = list.map(e => `
    <div class="entry-card" data-id="${e.id}">
      <div class="entry-card-top">
        <div class="entry-icon">${CATEGORY_ICONS[e.category] || '📌'}</div>
        <div class="entry-info">
          <h3>${esc(e.name)}</h3>
          <div class="account">${esc(e.account || '未设置账号')}</div>
        </div>
        <span class="entry-tag">${esc(e.category)}</span>
      </div>
      <div class="entry-actions">
        <button data-copy-account="${e.id}">复制账号</button>
        <button data-copy-password="${e.id}">复制密码</button>
      </div>
    </div>
  `).join('');

  container.querySelectorAll('.entry-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.entry-actions')) return;
      openDetail(card.dataset.id);
    });
  });
  container.querySelectorAll('[data-copy-account]').forEach(btn => {
    btn.addEventListener('click', ev => {
      ev.stopPropagation();
      const entry = entries.find(x => x.id === btn.dataset.copyAccount);
      if (entry?.account) copyText(entry.account);
      else toast('未设置账号');
    });
  });
  container.querySelectorAll('[data-copy-password]').forEach(btn => {
    btn.addEventListener('click', ev => {
      ev.stopPropagation();
      const entry = entries.find(x => x.id === btn.dataset.copyPassword);
      if (entry?.password) copyText(entry.password);
      else toast('未设置密码');
    });
  });
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function openDetail(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  document.getElementById('detail-edit-btn').style.display = 'block';
  detailEntryId = id;
  document.getElementById('detail-name').textContent = e.name;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-row">
      <div><div class="detail-label">分类</div><div class="detail-value">${esc(e.category)}</div></div>
    </div>
    <div class="detail-row">
      <div style="flex:1"><div class="detail-label">账号</div><div class="detail-value">${esc(e.account || '—')}</div></div>
      ${e.account ? `<button class="detail-copy" data-copy="${esc(e.account)}">复制</button>` : ''}
    </div>
    <div class="detail-row">
      <div style="flex:1"><div class="detail-label">密码</div><div class="detail-value" id="detail-pw">${'•'.repeat(Math.min((e.password||'').length, 12) || 6)}</div></div>
      <button class="detail-copy" id="toggle-detail-pw" data-pw="${esc(e.password || '')}">显示</button>
      ${e.password ? `<button class="detail-copy" data-copy="${esc(e.password)}">复制</button>` : ''}
    </div>
    ${e.notes ? `<div class="detail-row"><div><div class="detail-label">备注</div><div class="detail-value">${esc(e.notes)}</div></div></div>` : ''}
  `;
  document.getElementById('detail-body').querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => copyText(btn.dataset.copy));
  });
  const toggleBtn = document.getElementById('toggle-detail-pw');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      const pwEl = document.getElementById('detail-pw');
      if (toggleBtn.textContent === '显示') {
        pwEl.textContent = toggleBtn.dataset.pw;
        toggleBtn.textContent = '隐藏';
      } else {
        pwEl.textContent = '•'.repeat(Math.min(toggleBtn.dataset.pw.length, 12) || 6);
        toggleBtn.textContent = '显示';
      }
    });
  }
  document.getElementById('detail-modal').classList.add('open');
}

function openEdit(id) {
  editingId = id || null;
  document.getElementById('modal-title').textContent = id ? '编辑账号' : '添加账号';
  document.getElementById('delete-btn').style.display = id ? 'block' : 'none';
  if (id) {
    const e = entries.find(x => x.id === id);
    document.getElementById('f-name').value = e.name;
    document.getElementById('f-category').value = e.category;
    document.getElementById('f-account').value = e.account || '';
    document.getElementById('f-password').value = e.password || '';
    document.getElementById('f-notes').value = e.notes || '';
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-category').value = '其他';
    document.getElementById('f-account').value = '';
    document.getElementById('f-password').value = '';
    document.getElementById('f-notes').value = '';
  }
  document.getElementById('edit-modal').classList.add('open');
}

function closeModals() {
  document.getElementById('edit-modal').classList.remove('open');
  document.getElementById('detail-modal').classList.remove('open');
}

// ── PIN Pad ──
function updatePinDots() {
  const dots = document.querySelectorAll('#pin-dots span');
  dots.forEach((d, i) => {
    d.style.display = i < pinLength ? 'block' : 'none';
    d.classList.toggle('filled', i < currentPin.length);
  });
}

async function tryUnlock() {
  if (currentPin.length !== pinLength) return;
  const meta = getMeta();
  const hash = await hashPin(currentPin);
  if (hash !== meta.pinHash) {
    document.getElementById('lock-error').textContent = 'PIN 码错误，请重试';
    currentPin = '';
    updatePinDots();
    return;
  }
  const ok = await loadVault(currentPin);
  if (!ok) {
    document.getElementById('lock-error').textContent = '数据解密失败';
    currentPin = '';
    updatePinDots();
    return;
  }
  document.getElementById('lock-error').textContent = '';
  showScreen('app-screen');
  renderCategories();
  renderEntries();
  renderShots();
  syncPendingScreenshots();
}

// ── Init ──
function init() {
  initNative();
  const meta = getMeta();

  if (!meta) {
    showScreen('setup-screen');
  } else {
    pinLength = meta.pinLength || 4;
    updatePinDots();
    showScreen('lock-screen');
  }

  // Setup
  document.getElementById('setup-btn').addEventListener('click', async () => {
    const pin = document.getElementById('setup-pin').value;
    const confirm = document.getElementById('setup-pin-confirm').value;
    if (!/^\d{4,6}$/.test(pin)) { toast('PIN 码需为 4～6 位数字'); return; }
    if (pin !== confirm) { toast('两次 PIN 码不一致'); return; }
    await setupVault(pin);
    currentPin = pin;
    showScreen('app-screen');
    renderCategories();
    renderEntries();
    renderShots();
    syncPendingScreenshots();
    toast('设置完成，开始记录吧！');
  });

  // PIN pad
  document.getElementById('pin-pad').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const key = btn.dataset.key;
    if (key === 'clear') { currentPin = ''; }
    else if (key === 'back') { currentPin = currentPin.slice(0, -1); }
    else if (currentPin.length < pinLength) { currentPin += key; }
    updatePinDots();
    tryUnlock();
  });

  // Search
  document.getElementById('search-input').addEventListener('input', renderEntries);

  // FAB & modals
  document.getElementById('add-btn').addEventListener('click', () => openEdit(null));
  document.getElementById('modal-close').addEventListener('click', closeModals);
  document.getElementById('detail-close').addEventListener('click', closeModals);
  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) closeModals(); });
  });

  document.getElementById('gen-password').addEventListener('click', () => {
    document.getElementById('f-password').value = generatePassword();
    document.getElementById('f-password').type = 'text';
  });

  document.querySelectorAll('.toggle-vis').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  });

  document.getElementById('save-btn').addEventListener('click', async () => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { toast('请填写程序名称'); return; }
    const data = {
      id: editingId || uid(),
      name,
      category: document.getElementById('f-category').value,
      account: document.getElementById('f-account').value.trim(),
      password: document.getElementById('f-password').value,
      notes: document.getElementById('f-notes').value.trim(),
      updatedAt: Date.now()
    };
    if (editingId) {
      const idx = entries.findIndex(x => x.id === editingId);
      entries[idx] = data;
    } else {
      entries.push(data);
    }
    await saveVault();
    closeModals();
    renderEntries();
    toast(editingId ? '已更新' : '已保存');
  });

  document.getElementById('delete-btn').addEventListener('click', async () => {
    if (!confirm('确定删除这条记录吗？')) return;
    entries = entries.filter(x => x.id !== editingId);
    await saveVault();
    closeModals();
    renderEntries();
    toast('已删除');
  });

  document.getElementById('detail-edit-btn').addEventListener('click', () => {
    closeModals();
    openEdit(detailEntryId);
  });

  document.getElementById('lock-btn').addEventListener('click', lockApp);

  // Bottom nav
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('home-view').style.display = tab === 'home' ? 'block' : 'none';
      document.getElementById('shots-view').style.display = tab === 'shots' ? 'block' : 'none';
      document.getElementById('settings-view').classList.toggle('active', tab === 'settings');
      document.getElementById('search-wrap').style.display = tab === 'home' ? 'flex' : 'none';
      document.getElementById('add-btn').style.display = tab === 'home' ? 'flex' : 'none';
      const titles = { home: '我的账号', shots: '截图记事', settings: '设置' };
      document.getElementById('page-title').textContent = titles[tab] || '密码本';
      if (tab === 'shots') renderShots();
    });
  });

  document.getElementById('overlay-toggle-item').addEventListener('click', () => {
    setOverlayEnabledUI(!overlayEnabled);
  });
  document.getElementById('overlay-perm-btn').addEventListener('click', () => {
    if (nativePlugin) nativePlugin.openOverlaySettings();
  });

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && cryptoKey) {
      refreshNativeState();
      syncPendingScreenshots();
    }
  });

  // Settings
  document.getElementById('export-btn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify({ entries, exportedAt: new Date().toISOString() }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `密码本备份_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast('备份已导出');
  });

  document.getElementById('import-btn').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });

  document.getElementById('file-input').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const data = JSON.parse(await file.text());
      if (!Array.isArray(data.entries)) throw new Error('invalid');
      const merge = confirm(`将导入 ${data.entries.length} 条记录。\n\n点「确定」合并到现有数据\n点「取消」替换全部数据`);
      if (merge) {
        const ids = new Set(entries.map(x => x.id));
        data.entries.forEach(item => {
          if (ids.has(item.id)) {
            const idx = entries.findIndex(x => x.id === item.id);
            entries[idx] = item;
          } else {
            entries.push(item);
          }
        });
      } else {
        entries = data.entries;
      }
      await saveVault();
      renderEntries();
      toast('导入成功');
    } catch {
      toast('导入失败，文件格式不正确');
    }
    e.target.value = '';
  });

  document.getElementById('change-pin-btn').addEventListener('click', async () => {
    const oldPin = prompt('请输入当前 PIN 码：');
    if (!oldPin) return;
    const hash = await hashPin(oldPin);
    if (hash !== getMeta().pinHash) { toast('当前 PIN 码错误'); return; }
    const newPin = prompt('请输入新 PIN 码（4～6 位数字）：');
    if (!newPin || !/^\d{4,6}$/.test(newPin)) { toast('新 PIN 码格式不正确'); return; }
    const confirmPin = prompt('请再次输入新 PIN 码：');
    if (newPin !== confirmPin) { toast('两次输入不一致'); return; }
    const salt = crypto.getRandomValues(new Uint8Array(16));
    cryptoKey = await deriveKey(newPin, salt);
    pinLength = newPin.length;
    const pinHash = await hashPin(newPin);
    const encrypted = await encrypt(entries, cryptoKey);
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      pinHash, salt: Array.from(salt), pinLength, vault: encrypted
    }));
    toast('PIN 码已修改');
  });

  document.getElementById('about-btn').addEventListener('click', () => {
    alert('密码本 v2.0\n\n• 数据加密保存在本机\n• 支持后台悬浮球 + 截图保存\n• 需在设置中开启悬浮窗权限');
  });

  document.getElementById('clear-data-btn').addEventListener('click', async () => {
    if (!confirm('确定清除所有数据并重置应用吗？此操作不可恢复！')) return;
    if (!confirm('再次确认：所有账号密码将被永久删除！')) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

init();
</script>

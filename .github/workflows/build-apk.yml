name: Build Password Vault APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'password-vault-app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: password-vault-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses

      - name: Install dependencies
        working-directory: password-vault-app
        run: npm ci

      - name: Sync Capacitor
        working-directory: password-vault-app
        run: npx cap sync android

      - name: Build debug APK
        working-directory: password-vault-app/android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: password-vault-apk
          path: password-vault-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

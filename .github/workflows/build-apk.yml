name: Build 密拾 APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'password-vault-app/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: password-vault-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses

      - name: Install dependencies
        working-directory: password-vault-app
        run: npm ci

      - name: Sync Capacitor Android
        working-directory: password-vault-app
        run: npx cap sync android

      - name: Build debug APK
        working-directory: password-vault-app/android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          cp password-vault-app/android/app/build/outputs/apk/debug/app-debug.apk mishi-v2.1-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mishi-apk
          path: mishi-v2.1-debug.apk
          retention-days: 90

      - name: Create GitHub Release (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mishi-apk-${{ github.run_number }}
          name: 密拾 APK #${{ github.run_number }}
          body: |
            密拾 Android Debug APK（GitHub Actions 自动构建）

            - 安装前请在手机允许「未知来源应用」
            - 本包为 debug 签名，仅供测试
          files: mishi-v2.1-debug.apk
          draft: false
          prerelease: false
          generate_release_notes: true
